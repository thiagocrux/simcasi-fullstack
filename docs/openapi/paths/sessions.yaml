collection:
  get:
    operationId: findSessions
    summary: Find sessions
    description: Lists currently active user sessions.
    tags:
      - Sessions
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/Page'
      - $ref: '../components/parameters.yaml#/Limit'
      - $ref: '../components/parameters.yaml#/Search'
      - $ref: '../components/parameters.yaml#/StartDate'
      - $ref: '../components/parameters.yaml#/EndDate'
      - $ref: '../components/parameters.yaml#/TimezoneOffset'
      - name: userId
        in: query
        required: false
        schema:
          type: string
          format: uuid
        description: Filter sessions by a specific user.
        example: '7e8f9a0b-1234-5678-9abc-def012345678'
      - $ref: '../components/parameters.yaml#/IncludeRelatedUsers'
      - $ref: '../components/parameters.yaml#/IncludeDeleted'
      - $ref: '../components/parameters.yaml#/TimezoneOffsetHeader'
    responses:
      '200':
        description: Paginated list of active sessions successfully retrieved (OK).
        content:
          application/json:
            schema:
              $ref: '../components/schemas/session.yaml#/SessionListResponse'
      '401':
        $ref: '../components/responses.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses.yaml#/ForbiddenError'
  delete:
    operationId: revokeAllSessions
    summary: Revoke all sessions for a user
    description: |
      Terminates all active sessions belonging to the specified user, forcing a re-authentication on all devices.

      **Role Restrictions:**
      * **Admin:** Can revoke all sessions for any user.
      * **User/Viewer:** Can only revoke all sessions for their own account.
    tags:
      - Sessions
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
                format: uuid
                description: Unique identifier of the user whose sessions will be revoked.
          examples:
            revokeAllSessions:
              summary: Revoke all sessions for a user
              value:
                userId: 7e8f9a0b-1234-5678-9abc-def012345678
    responses:
      '200':
        description: All sessions successfully revoked (OK).
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
      '401':
        $ref: '../components/responses.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses.yaml#/ForbiddenError'

item:
  get:
    operationId: getSession
    summary: Get a session
    description: Fetches full details of a single session record identified by its UUID.
    tags:
      - Sessions
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier for the session.
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Session details successfully retrieved (OK).
        content:
          application/json:
            schema:
              $ref: '../components/schemas/session.yaml#/Session'
      '401':
        $ref: '../components/responses.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses.yaml#/ForbiddenError'
      '404':
        $ref: '../components/responses.yaml#/NotFoundError'
  delete:
    operationId: revokeSession
    summary: Revoke a session
    description: |
      Terminates an active user session by revoking its security tokens and forcing a re-authentication flow.

      **Role Restrictions:**
      * **Admin:** Can revoke any session.
      * **User/Viewer:** Can only revoke their own sessions.
    tags:
      - Sessions
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier for the session.
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/commons.yaml#/AuditMetadata'
          examples:
            revokeSession:
              summary: Revoke active session with audit trail
              value:
                ipAddress: 192.168.1.100
                userAgent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    responses:
      '204':
        description: Session successfully revoked and tokens invalidated (No Content).
      '401':
        $ref: '../components/responses.yaml#/UnauthorizedError'
      '403':
        $ref: '../components/responses.yaml#/ForbiddenError'
      '404':
        $ref: '../components/responses.yaml#/NotFoundError'
